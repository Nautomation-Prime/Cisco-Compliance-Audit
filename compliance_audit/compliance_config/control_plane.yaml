---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║  CONTROL PLANE — STP, VTP, DHCP snooping, ARP inspection …       ║
# ╚═══════════════════════════════════════════════════════════════════╝
#
# severity / tags / applies_to_roles / exclude_hostnames are supported
# on every check — see management_plane.yaml for full field descriptions.

compliance:
  control_plane:

    # ── SPANNING TREE ─────────────────────────────────────────────

    stp_mode:
      enabled: false
      severity: medium
      tags: [stp, layer2-security, cis]
      mode: "rapid-pvst"           # rapid-pvst | mst

    stp_extend_system_id:
      enabled: false
      severity: medium
      tags: [stp]

    stp_pathcost_method:
      enabled: false
      severity: low
      tags: [stp]
      method: "long"

    stp_loopguard_default:
      enabled: false
      severity: medium
      tags: [stp, layer2-security]

    stp_priority:
      enabled: false
      severity: medium
      tags: [stp, availability]
      core_priority: 4096
      access_priority: 36863

    stp_backbonefast:
      enabled: false
      severity: low
      tags: [stp, availability]

    stp_uplinkfast:
      enabled: false
      severity: low
      tags: [stp, availability]

    # ── VTP ───────────────────────────────────────────────────────

    vtp_mode:
      enabled: false
      severity: high
      tags: [layer2-security, hardening]
      expected: "off"              # transparent | off | client | server

    vtp_domain:
      enabled: false
      severity: medium
      tags: [layer2-security]
      expected: ""

    # ── DHCP SNOOPING ─────────────────────────────────────────────

    dhcp_snooping_global:
      enabled: false
      severity: high
      tags: [layer2-security, cis, pci]

    dhcp_snooping_vlans:
      enabled: false
      severity: medium
      tags: [layer2-security]
      vlans: ""

    no_dhcp_snooping_information_option:
      enabled: false
      severity: low
      tags: [layer2-security]

    # ── DYNAMIC ARP INSPECTION ────────────────────────────────────

    arp_inspection_vlans:
      enabled: false
      severity: high
      tags: [layer2-security, cis, pci]
      vlans: ""

    arp_inspection_validate:
      enabled: false
      severity: medium
      tags: [layer2-security]
      checks: ["src-mac", "dst-mac", "ip"]

    # ── ERRDISABLE RECOVERY ───────────────────────────────────────

    errdisable_recovery:
      enabled: false
      severity: low
      tags: [availability, hardening]
      causes:
        - bpduguard
        - storm-control
        - psecure-violation
        - arp-inspection
        - dhcp-rate-limit
        - link-flap
      interval: 300

    # ── UDLD ──────────────────────────────────────────────────────

    udld_global:
      enabled: false
      severity: medium
      tags: [availability, layer2-security]
      mode: "enable"               # enable | aggressive

    # ── CONTROL-PLANE POLICING ────────────────────────────────────

    control_plane_policing:
      enabled: false
      severity: high
      tags: [availability, hardening, cis, nist]
