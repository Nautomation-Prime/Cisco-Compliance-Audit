# ╔═══════════════════════════════════════════════════════════════════╗
# ║         CISCO IOS-XE  COMPLIANCE  AUDIT  CONFIGURATION            ║
# ║                                                                   ║
# ║  Every check can be toggled with  enabled: true / false           ║
# ║  Parameters under each check set the expected (compliant) value   ║
# ║                                                                   ║
# ║  Tip: Copy this file per site and run with:                       ║
# ║       python -m compliance_audit -c site_london.yaml              ║
# ╚═══════════════════════════════════════════════════════════════════╝


# ═══════════════════════════════════════════════════════════════════
# §1  AUDIT  SETTINGS  (how the audit runs)
# ═══════════════════════════════════════════════════════════════════
# These control the audit behaviour — report formats, concurrency,
# timeouts, and reference VLANs.  You'll tweak these most often.

audit_settings:
  max_workers: 5                  # Max concurrent device audits (1 = sequential)
  collect_timeout: 30             # Per-command collection timeout (seconds)
  output_dir: "./reports"         # Where to write reports
  html_report: true               # Generate an HTML report alongside console output
  json_report: false              # Also dump raw JSON findings
  parking_vlan: 99                # VLAN for unused ports
  native_vlan: 99                 # Expected native VLAN on trunks (for checking)


# ═══════════════════════════════════════════════════════════════════
# §2  CONNECTION  (how to reach the devices)
# ═══════════════════════════════════════════════════════════════════

connection:
  device_type: "cisco_xe"          # Netmiko device type for IOS-XE
  timeout: 30                      # SSH connection timeout (seconds)
  retries: 3                       # Connection retry attempts
  cred_target: "MyApp/ADM"         # Credential vault target (or leave blank for prompt)
  jump_host: "192.0.2.60"          # Jump/bastion host IP
  use_jump_host: false             # Set false to connect directly (or use --no-jump)

  # ── Credential Store ─────────────────────────────────────
  # Choose how credentials are stored and retrieved.
  #
  # Options:
  #   "none"     – env vars → interactive prompt only (default)
  #   "keyring"  – use the OS keyring (GNOME Keyring, KWallet on Linux;
  #                Credential Manager on Windows; Keychain on macOS).
  #                Requires: pip install keyring
  #
  # When set to "keyring":
  #   • On first run you'll be prompted for username/password
  #   • Credentials are saved to the OS keyring under service_name below
  #   • Subsequent runs retrieve them automatically — no prompt needed
  #   • To update stored creds, delete them from your keyring or set
  #     credential_store back to "none" and re-store
  #
  credential_store: "none"         # "none" or "keyring"
  keyring_service: "cisco-compliance-audit"   # keyring service name (namespace)


# ═══════════════════════════════════════════════════════════════════
# §3  DEVICE  INVENTORY  (what to audit)
# ═══════════════════════════════════════════════════════════════════
# Each entry needs:
#   hostname  – used to detect the device role (parsed against hostname_roles)
#   ip        – management IP (or DNS name) the auditor connects to
#
# Add as many entries as you need — one per line, indented under "devices:".
# To skip the inventory and audit a single device ad-hoc, use the CLI:
#   python -m compliance_audit --device GB-SITE1-001ASW001:10.1.1.1

devices:
  - hostname: GB-SITE1-001ASW001
    ip: 192.0.2.61
  - hostname: GB-SITE1-001ASW002
    ip: 192.0.2.62
  # - hostname: placeholder
  #   ip: 10.1.3.1
  # - hostname: placeholder
  #   ip: 10.1.4.1


# ═══════════════════════════════════════════════════════════════════
# §4  CLASSIFICATION  (how the auditor understands your network)
# ═══════════════════════════════════════════════════════════════════
# These sections tell the auditor how to identify device roles and
# endpoint neighbours.  Set them once per organisation — you rarely
# need to change them between runs.


# ─── 4a  HOSTNAME ROLE CODES ─────────────────────────────────────
# Maps the 2-4 letter code in the hostname to its meaning.
# The auditor uses these to:
#   • detect the device role (for role-specific checks)
#   • classify trunk ports as uplinks or downlinks (via CDP/LLDP neighbor)
#
# Each entry needs:
#   code         – the letters that appear in the hostname (case-insensitive)
#   role         – internal identifier used throughout the engine
#   display      – human-friendly name for reports
#   trunk_signal – how to treat a trunk to a neighbor with this role:
#                  "uplink"   = the local port faces toward the core
#                  "downlink" = the local port faces toward the access layer
#                  "none"     = no automatic trunk classification
#
# You can add, remove, or rename entries freely.  The hostname regex
# is built dynamically from whatever codes are listed here.

hostname_roles:
  - code: ASW
    role: access_switch
    display: "Access Switch"
    trunk_signal: downlink       # Seeing an ASW neighbor → local port is a downlink

  - code: CSW
    role: core_switch
    display: "Core Switch"
    trunk_signal: uplink         # Seeing a CSW neighbor → local port is an uplink

  - code: SDW
    role: sdwan_router
    display: "SD-WAN Router"
    trunk_signal: none

  - code: ISW
    role: industrial_switch
    display: "Industrial Switch"
    trunk_signal: downlink       # Seeing an ISW neighbor → local port is a downlink

  - code: DSW
    role: distribution_switch
    display: "Distribution Switch"
    trunk_signal: none


# ─── 4b  ENDPOINT NEIGHBORS (APs, etc.) ──────────────────────────
# Trunks to endpoints (e.g. Cisco APs) are detected via CDP / LLDP
# and classified as TRUNK_ENDPOINT instead of TRUNK_DOWNLINK.
# This matters because endpoint trunks should get BPDU guard (like
# access ports) rather than root guard, and don't need DHCP/DAI trust.
#
# Detection uses three signals (any match → endpoint):
#   hostname_patterns  – regex matched against the CDP device-id / LLDP system-name
#   platform_patterns  – regex matched against the CDP platform string
#   capabilities       – CDP capability keyword (e.g. "Trans-Bridge" for APs)
#
# All regexes are case-insensitive.

endpoint_neighbors:
  enabled: true
  hostname_patterns:
    - "^AP[\\d_-]"        # AP1_Office, AP-Floor2, AP01 (AP + digit/separator)
    - "^AP[0-9A-F]{4}"   # APxxxx (Cisco default lightweight AP names)
    - "-AP\\d{3}$"        # ...AP001 suffix in some naming schemes
  platform_patterns:
    - "AIR-"              # Cisco Aironet (AIR-CAP / AIR-AP)
    - "C91[2-7]"          # Catalyst 9100 series APs (C9120AXI-E, C9130 …)
    - "CW91"              # Catalyst Wi-Fi 6E (CW9162, CW9164, CW9166)
    - "MR[0-9]"           # Meraki APs (MR46, MR56, etc.)
  capabilities:
    - "Trans-Bridge"      # Cisco APs report this CDP capability (R T)


# ═══════════════════════════════════════════════════════════════════
# §5  COMPLIANCE  CHECKS  (what to audit)
# ═══════════════════════════════════════════════════════════════════
# Every check has  enabled: true/false  plus check-specific params.
# Checks are grouped into four categories that can also be selected
# on the command line with  --categories management_plane data_plane

compliance:

  # ┌───────────────────────────────────────────────────────────────┐
  # │                    MANAGEMENT  PLANE                          │
  # └───────────────────────────────────────────────────────────────┘
  management_plane:

    # ── SERVICES ────────────────────────────────────────────────
    service_password_encryption:
      enabled: true
      # Expect: service password-encryption

    service_timestamps_debug:
      enabled: true
      expected: "service timestamps debug datetime msec localtime show-timezone"

    service_timestamps_log:
      enabled: true
      expected: "service timestamps log datetime msec localtime show-timezone"

    service_tcp_keepalives_in:
      enabled: false
      # Expect: service tcp-keepalives-in

    service_tcp_keepalives_out:
      enabled: false
      # Expect: service tcp-keepalives-out

    no_service_pad:
      enabled: false
      # Expect: no service pad

    no_service_finger:
      enabled: false        # rare on modern IOS-XE
      # Expect: no service finger

    no_service_config:
      enabled: false
      # Expect: no service config

    no_service_tcp_small_servers:
      enabled: false        # only relevant on very old IOS
    no_service_udp_small_servers:
      enabled: false

    # ── IP SETTINGS ─────────────────────────────────────────────
    no_ip_source_route:
      enabled: true
      # Expect: no ip source-route

    no_ip_finger:
      enabled: false        # not present on most IOS-XE
    no_ip_bootp_server:
      enabled: false
      # Expect: no ip bootp server

    no_ip_http_server:
      enabled: true
      # Expect: no ip http server  (disable plain HTTP)

    ip_http_secure_server:
      enabled: false        # Set true if you WANT HTTPS management enabled
      # Expect: ip http secure-server

    no_ip_http_secure_server:
      enabled: true         # Set true if you want HTTPS OFF
      # Expect: no ip http secure-server

    ip_http_authentication:
      enabled: false
      method: "local"       # local | aaa

    ip_http_access_class:
      enabled: false
      acl_name: ""

    no_ip_gratuitous_arps:
      enabled: false
      # Expect: no ip gratuitous-arps

    ip_cef:
      enabled: false
      # Expect: ip cef

    no_ip_domain_lookup:
      enabled: false
      # Expect: no ip domain lookup

    ip_domain_name:
      enabled: true
      expected: "test.domain.com"          # Set your corporate domain, e.g. "corp.example.com"

    # ── SSH ─────────────────────────────────────────────────────
    ssh_version:
      enabled: true
      version: 2
      # Expect: ip ssh version 2

    ssh_timeout:
      enabled: true
      max_seconds: 60
      # Expect: ip ssh time-out <n>  where n <= max_seconds

    ssh_authentication_retries:
      enabled: true
      max_retries: 3
      # Expect: ip ssh authentication-retries <n>

    ssh_source_interface:
      enabled: false
      interface: ""         # e.g. "Loopback0" or "Vlan100"

    ssh_rsa_min_modulus:
      enabled: true
      min_bits: 2048

    # ── AAA ─────────────────────────────────────────────────────
    aaa_new_model:
      enabled: true
      # Expect: aaa new-model

    aaa_authentication_login:
      enabled: true
      expected: "aaa authentication login default group AAA_NOC local"

    aaa_authentication_enable:
      enabled: true
      expected: "aaa authentication enable default group AAA_NOC enable"

    aaa_authorization_console:
      enabled: false
      # Expect: aaa authorization console

    aaa_authorization_exec:
      enabled: true
      expected: "aaa authorization exec default group AAA_NOC local"

    aaa_authorization_commands:
      enabled: true
      levels: [1, 15]
      expected_prefix: "aaa authorization commands 15 default group AAA_NOC local"

    aaa_accounting_exec:
      enabled: false
      expected: "aaa accounting exec default start-stop group AAA_NOC"

    aaa_accounting_commands:
      enabled: false
      levels: [1, 15]
      expected_prefix: "aaa accounting commands 15 default start-stop group AAA_NOC"

    aaa_accounting_connection:
      enabled: false
      expected: "aaa accounting connection default start-stop group AAA_NOC"

    aaa_session_id:
      enabled: false
      expected: "aaa session-id common"

    tacacs_server:
      enabled: false
      # Just checks at least one 'tacacs server' block exists
      min_servers: 1

    tacacs_source_interface:
      enabled: false
      interface: ""

    radius_server:
      enabled: false
      min_servers: 0

    # ── NTP ─────────────────────────────────────────────────────
    ntp_servers:
      enabled: true
      expected_servers: ["192.0.2.70", "192.0.2.71"]    # e.g. ["10.10.10.1", "10.10.10.2"]
      min_servers: 1

    ntp_authenticate:
      enabled: false
      # Expect: ntp authenticate + ntp authentication-key + ntp trusted-key

    ntp_source_interface:
      enabled: false
      interface: ""

    clock_timezone:
      enabled: false
      timezone: "GMT"
      offset: 0

    # ── LOGGING ─────────────────────────────────────────────────
    logging_buffered:
      enabled: true
      min_size: 64000
      level: "informational"   # emergencies|alerts|critical|errors|warnings|notifications|informational|debugging

    logging_console:
      enabled: true
      # Some orgs want 'logging console critical', others 'no logging console'
      level: "critical"

    logging_monitor:
      enabled: false
      level: "warnings"

    logging_trap:
      enabled: false
      level: "informational"

    logging_host:
      enabled: true
      expected_hosts: ["192.0.2.70", "192.0.2.71"]       # e.g. ["10.20.30.1", "10.20.30.2"]
      min_hosts: 1

    logging_source_interface:
      enabled: false
      interface: ""

    logging_origin_id:
      enabled: false
      type: "hostname"         # hostname | ip | string

    no_logging_console:
      enabled: false           # Enable this INSTEAD of logging_console if policy is "no console logging at all"

    # ── SNMP ────────────────────────────────────────────────────
    snmp_v3_only:
      enabled: false
      # Checks: snmp-server group ... v3 priv

    snmp_no_community_public:
      enabled: true
      # Checks that 'snmp-server community public' does NOT exist

    snmp_no_community_private:
      enabled: true
      # Checks that 'snmp-server community private' does NOT exist

    snmp_community_acl:
      enabled: false
      # Any snmp-server community line should include an ACL reference

    snmp_server_host:
      enabled: false
      expected_hosts: []

    snmp_contact:
      enabled: false
      expected: ""

    snmp_location:
      enabled: false
      expected: ""

    snmp_ifindex_persist:
      enabled: false
      # Expect: snmp-server ifindex persist

    # ── BANNERS ─────────────────────────────────────────────────
    banner_login:
      enabled: false
      # Just checks that 'banner login' exists (content not validated)
      required_text: ""       # Optional: substring that MUST appear in banner

    banner_motd:
      enabled: false
      required_text: ""

    banner_exec:
      enabled: true
      required_text: ""

    # ── LOCAL USERS ─────────────────────────────────────────────
    enable_secret:
      enabled: true
      # Checks: 'enable secret' is present (not 'enable password')

    no_enable_password:
      enabled: true
      # Checks: 'enable password' does NOT exist

    username_secret:
      enabled: true
      # Checks: all 'username' definitions use 'secret' not 'password'

    # ── VTY LINES ───────────────────────────────────────────────
    vty_transport_input_ssh:
      enabled: true
      # Expect: transport input ssh (no telnet)

    vty_exec_timeout:
      enabled: false
      minutes: 5
      seconds: 0

    vty_access_class:
      enabled: false
      acl_name: ""            # Expected access-class ACL

    vty_logging_synchronous:
      enabled: false

    vty_login_authentication:
      enabled: false
      method_list: "default"

    # ── CONSOLE LINE ────────────────────────────────────────────
    console_exec_timeout:
      enabled: false
      minutes: 5
      seconds: 0

    console_logging_synchronous:
      enabled: false

    console_login_authentication:
      enabled: false
      method_list: "default"

    # ── ARCHIVE / CONFIG LOGGING ────────────────────────────────
    archive_logging:
      enabled: false
      # Expect: archive / log config / logging enable

    # ── LOGIN SECURITY ──────────────────────────────────────────
    login_block_for:
      enabled: false
      seconds: 120
      attempts: 3
      within: 60
      # Expect: login block-for 120 attempts 3 within 60

    login_on_failure_log:
      enabled: true
    login_on_success_log:
      enabled: true

    login_delay:
      enabled: false
      seconds: 2

    # ── CDP / LLDP ──────────────────────────────────────────────
    # NOTE: CDP is needed for uplink/downlink detection, so be careful
    # about disabling it globally when you rely on CDP for the audit.
    cdp_global:
      enabled: false
      state: "enabled"         # "enabled" or "disabled"

    lldp_global:
      enabled: false
      state: "enabled"


  # ┌───────────────────────────────────────────────────────────────┐
  # │                     CONTROL  PLANE                            │
  # └───────────────────────────────────────────────────────────────┘
  control_plane:

    # ── SPANNING TREE ───────────────────────────────────────────
    stp_mode:
      enabled: true
      mode: "rapid-pvst"       # rapid-pvst | mst

    stp_extend_system_id:
      enabled: false
      # Expect: spanning-tree extend system-id

    stp_pathcost_method:
      enabled: false
      method: "long"
      # Expect: spanning-tree pathcost method long

    stp_loopguard_default:
      enabled: false
      # Expect: spanning-tree loopguard default

    stp_priority:
      enabled: true
      # Role-dependent expected values
      core_priority: 4096      # CSW should be root or near-root
      access_priority: 36863   # ASW default (32768) + max VLAN ID (4095)
      # Set to 0 to skip the priority check for that role
      # Note: Displayed priority = base priority + VLAN ID

    stp_backbonefast:
      enabled: false
      # Only relevant for classic STP, not rapid-pvst

    stp_uplinkfast:
      enabled: false
      # Only relevant for classic STP, not rapid-pvst

    # ── VTP ─────────────────────────────────────────────────────
    vtp_mode:
      enabled: false
      expected: "off"   # transparent | off | client | server

    vtp_domain:
      enabled: false
      expected: ""

    # ── DHCP SNOOPING ──────────────────────────────────────────
    dhcp_snooping_global:
      enabled: true
      # Expect: ip dhcp snooping

    dhcp_snooping_vlans:
      enabled: true
      vlans: ""                 # e.g. "10,20,30-50"  — leave blank to just check it exists for any VLAN

    no_dhcp_snooping_information_option:
      enabled: false
      # Expect: no ip dhcp snooping information option

    # ── DYNAMIC ARP INSPECTION ──────────────────────────────────
    arp_inspection_vlans:
      enabled: false
      vlans: ""                 # e.g. "10,20,30" — blank = just check at least one VLAN

    arp_inspection_validate:
      enabled: false
      checks: ["src-mac", "dst-mac", "ip"]
      # Expect: ip arp inspection validate src-mac dst-mac ip

    # ── ERRDISABLE RECOVERY ─────────────────────────────────────
    errdisable_recovery:
      enabled: false
      causes:
        - bpduguard
        - storm-control
        - psecure-violation
        - arp-inspection
        - dhcp-rate-limit
        - link-flap
      interval: 300             # Expect: errdisable recovery interval <n>

    # ── UDLD ────────────────────────────────────────────────────
    udld_global:
      enabled: false
      mode: "enable"            # enable | aggressive

    # ── CONTROL-PLANE POLICING ──────────────────────────────────
    control_plane_policing:
      enabled: false
      # Just checks that 'service-policy' is applied under 'control-plane'

    # ── IP SOURCE GUARD ─────────────────────────────────────────
    ip_source_guard:
      enabled: false
      # Checked per-interface on access ports


  # ┌───────────────────────────────────────────────────────────────┐
  # │                       DATA  PLANE                             │
  # │            (Interface-level checks by port role)              │
  # └───────────────────────────────────────────────────────────────┘
  data_plane:

    # ── STORM CONTROL ───────────────────────────────────────────
    # Thresholds vary by port speed. Keys are speed in Mbps.
    # Each threshold has a rising value (upper limit) and falling value (lower limit)
    storm_control:
      enabled: true             # Master toggle for all storm control checks
      check_thresholds: true    # Enable/disable threshold validation independently
      check_action: false        # Enable/disable action validation independently
      action: "shutdown"        # shutdown | trap
      types:
        - broadcast
        - multicast
        # - unicast             # Uncomment if your policy requires unicast storm control
      thresholds_by_speed:
        10000:                  # 10 Gbps (TenGigabitEthernet/Te)
          broadcast:
            rising: 0.10
            falling: 0.07
          multicast:
            rising: 0.10
            falling: 0.07
          unicast:
            rising: 0.10
            falling: 0.07
        1000:                   # 1 Gbps (GigabitEthernet/Gi)
          broadcast:
            rising: 1.00
            falling: 0.70
          multicast:
            rising: 1.00
            falling: 0.70
          unicast:
            rising: 1.00
            falling: 0.70
        100:                    # 100 Mbps (FastEthernet/Fa)
          broadcast:
            rising: 10.00
            falling: 7.00
          multicast:
            rising: 10.00
            falling: 7.00
          unicast:
            rising: 10.00
            falling: 7.00
      default_thresholds:       # Fallback when speed is unknown (defaults to 1G values)
        broadcast:
          rising: 1.00
          falling: 0.70
        multicast:
          rising: 1.00
          falling: 0.70
        unicast:
          rising: 1.00
          falling: 0.70

    # ── BPDU GUARD ──────────────────────────────────────────────
    # Applied on ACCESS ports and TRUNK_ENDPOINT ports (APs etc.).
    # Never on trunk uplinks/downlinks to other switches.
    bpdu_guard:
      enabled: true
      on_endpoint_trunks: true   # Also require BPDU guard on AP trunk ports
      # Expect: spanning-tree bpduguard enable  (per-interface)

    # ── ROOT GUARD ──────────────────────────────────────────────
    # Applied only on TRUNK DOWNLINKS (to access layer switches).
    # NEVER applied on uplinks or endpoint trunks (APs etc.).
    # The auditor auto-detects uplinks using STP root port +
    # CDP/LLDP neighbor roles.
    root_guard:
      enabled: true
      # Expect: spanning-tree guard root  (per-interface)

    # ── PORTFAST ────────────────────────────────────────────────
    portfast:
      enabled: true
      # Applied on access ports only
      # Expect: spanning-tree portfast

    # ── SWITCHPORT NONEGOTIATE ──────────────────────────────────
    switchport_nonegotiate:
      enabled: true
      # All switchports should have DTP disabled
      # Expect: switchport nonegotiate

    # ── PORT SECURITY ───────────────────────────────────────────
    port_security:
      enabled: false
      # Access ports only
      max_mac: 2
      violation: "restrict"     # restrict | shutdown | protect
      aging_type: "inactivity"
      aging_time: 60            # minutes

    # ── TRUNK ALLOWED VLANs ─────────────────────────────────────
    trunk_allowed_vlans:
      enabled: false
      # Trunk ports should NOT allow ALL VLANs. Any explicit pruning = compliant.
      # Expect: switchport trunk allowed vlan <list>  (not "all")

    # ── SWITCHPORT MODE EXPLICIT ────────────────────────────────
    switchport_mode_explicit:
      enabled: true
      # Every switchport should have an explicit 'switchport mode access'
      # or 'switchport mode trunk'. Dynamic desirable/auto = non-compliant.

    # ── ACCESS VLAN ─────────────────────────────────────────────
    access_vlan_set:
      enabled: false
      # Access ports should have a specific VLAN assigned (not default VLAN 1)
      disallowed_vlans: [1]     # VLANs that should NOT be used for data access

    # ── INTERFACE DESCRIPTION ───────────────────────────────────
    interface_description:
      enabled: true
      # All active (non-shutdown) ports should have a description

    # ── DHCP SNOOPING TRUST ─────────────────────────────────────
    dhcp_snooping_trust:
      enabled: true
      # Expect on trunk uplinks and (optionally) downlinks.
      # Endpoint trunks (APs) typically do NOT need trust.
      on_uplinks: true
      on_downlinks: true
      on_endpoint_trunks: false

    # ── DHCP SNOOPING RATE LIMIT ────────────────────────────────
    dhcp_snooping_limit_rate:
      enabled: false
      rate: 15                  # packets per second on access ports

    # ── ARP INSPECTION TRUST ────────────────────────────────────
    arp_inspection_trust:
      enabled: false
      # Trust on trunk uplinks and (optionally) downlinks.
      # Endpoint trunks (APs) typically do NOT need trust.
      on_uplinks: true
      on_downlinks: true
      on_endpoint_trunks: false

    # ── UNUSED PORT HARDENING ───────────────────────────────────
    unused_ports:
      enabled: true
      must_be_shutdown: true
      must_be_access_mode: false
      must_be_in_parking_vlan: false   # Uses audit_settings.parking_vlan
      must_have_nonegotiate: false
      must_have_bpduguard: false
      must_have_no_cdp: false
      must_have_no_lldp: false
      must_have_description: true
      expected_description: "* unused *"  # Partial match (case-insensitive)

    # ── CDP PER-INTERFACE ───────────────────────────────────────
    no_cdp_on_access_ports:
      enabled: false
      # Expect: no cdp enable  (on access-facing ports)

    # ── IP PROXY-ARP ────────────────────────────────────────────
    no_ip_proxy_arp:
      enabled: false
      # Checks L3 interfaces have 'no ip proxy-arp'

    # ── NATIVE VLAN ON TRUNKS ───────────────────────────────────
    trunk_native_vlan:
      enabled: true
      expected_vlan: 99         # Expected native VLAN on trunks (best practice: non-default)


  # ┌───────────────────────────────────────────────────────────────┐
  # │                   ROLE-SPECIFIC  CHECKS                       │
  # └───────────────────────────────────────────────────────────────┘
  role_specific:

    core_switch:
      # CSW should be STP root (or root for a set of VLANs)
      stp_root_check:
        enabled: true
        # If this CSW should be root for all VLANs, enable this.
        # Verifies operational STP role is "root" for VLAN 1

      hsrp_vrrp:
        enabled: false
        # Checks that HSRP or VRRP is configured on SVIs

      routing_protocol_auth:
        enabled: false
        # Checks EIGRP/OSPF/BGP neighbor authentication

    access_switch:
      # ASW should NOT be STP root
      stp_not_root:
        enabled: true
        # Verify this ASW is NOT the STP root for any VLAN

      uplink_redundancy:
        enabled: false
        # Check that the ASW has a port-channel uplink (link aggregation)

    sdwan_router:
      # SDW-specific checks (placeholder for future)
      placeholder:
        enabled: false

    industrial_switch:
      # ISW-specific checks (placeholder for future)
      placeholder:
        enabled: false
