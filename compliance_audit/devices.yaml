---
# ╔═════════════════════════════════════════════════════════════════════╗
# ║                          DEVICE  INVENTORY                          ║
# ║                                                                     ║
# ║  Devices can be specified in several ways:                          ║
# ║                                                                     ║
# ║    Bare hostname    - "GB-SITE1-001ASW001"  (connects via DNS)      ║
# ║    Bare IP          - "192.0.2.61"   (hostname discovered from      ║
# ║                                       device prompt)                ║
# ║    Hostname only    - hostname: GB-SITE1-001ASW001                  ║
# ║    Hostname + IP    - hostname: GB-SITE1-001ASW001                  ║
# ║                       ip: 192.0.2.61                                ║
# ║                                                                     ║
# ║  You can list devices in two ways (or combine both):                ║
# ║                                                                     ║
# ║  1) FLAT LIST  — each device listed individually under "devices:"   ║
# ║  2) GROUPS  — Ansible-style groups under "groups:".                 ║
# ║     Each group can set a shared "role:" that applies to all its     ║
# ║     members.  A per-device "role:" inside a group overrides the     ║
# ║     group-level value.                                              ║
# ║                                                                     ║
# ║  To skip this file and audit a single device ad-hoc, use:           ║
# ║    python -m compliance_audit --device GB-SITE1-001ASW001:10.1.1.1  ║
# ║    python -m compliance_audit --device GB-SITE1-001ASW001           ║
# ╚═════════════════════════════════════════════════════════════════════╝


# ── FLAT LIST (individual devices) ──────────────────────────────────
# devices:
#   - GB-SITE1-001ASW001                   # bare hostname (DNS)
#   - 192.0.2.61                           # bare IP
#   - hostname: GB-SITE1-001ASW001         # hostname only (DNS)
#   - hostname: LEGACY-DEVICE-001          # full form with IP
#     ip: 10.1.1.1
#     role: access_switch                  # optional role override


# ── GROUPS (categorise many devices under one role) ─────────────────
groups:
  access_switches:
    role: access_switch
    devices:
      - GB-SITE1-001ASW001                 # bare hostname
      - GB-SITE1-001ASW002
      # Full form also works inside groups:
      # - hostname: GB-SITE1-001ASW003
      #   ip: 192.0.2.63

  # core_switches:
  #   role: core_switch
  #   devices:
  #     - GB-SITE1-001CSW001
  #     - GB-SITE1-001CSW002
